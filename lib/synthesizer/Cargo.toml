[package]
name = "ruse_synthesizer"
version = "0.1.0"
edition = "2021"

[dependencies]
ruse_object_graph = { path = "../object_graph" }

futures = "*"
serde = "*"
dashmap = { version = "*", features = ["raw-api"] }
hashbrown = { version = "*", features = ["raw"], default-features = false }
tokio = { version = "*", features = ["rt", "macros"] }
tokio-util = "*"
itertools = "*"

[dev-dependencies]
criterion = "*"
rand = "*"

[[bench]]
name = "benches"
harness = false

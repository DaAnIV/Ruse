[package]
name = "ruse_ts_synthesizer"
version = "0.1.0"
edition = "2021"

[dependencies]
ruse_object_graph = { path = "../object_graph" }
ruse_synthesizer = { path = "../synthesizer" }
ruse_ts_interpreter = { path = "../ts_interpreter" }

petgraph = "^0.6.2"

swc = "*"
swc_common = {version = "*", features = ["tty-emitter"]}
swc_ecma_parser = "*"
swc_ecma_ast = "*"
swc_visit = "*"

tokio = {version = "*", features = ["rt-multi-thread", "sync", "time", "macros"]}

[dev-dependencies]
criterion = { version = "*", features = ["async_tokio"] }

[[bench]]
name = "benches"
harness = false

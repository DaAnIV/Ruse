<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Viewer - File Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .file-selection-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background-color: white;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 3rem;
            color: #0d6efd;
        }
        .form-control {
            margin-bottom: 20px;
        }
        .btn-open {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
        }
        .no-files-message {
            text-align: center;
            color: #6c757d;
            font-style: italic;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <div class="file-selection-container">
            <div class="logo">
                <i class="fas fa-file-alt"></i>
                <h2 class="mt-3">Log Viewer</h2>
                <p class="text-muted">Select a log file to view</p>
            </div>
            
            {% if log_files %}
            <form id="fileSelectionForm">
                <div class="mb-3">
                    <label for="logFile" class="form-label">Log File:</label>
                    <select id="logFile" class="form-select form-select-lg" required>
                        <option value="">Choose a log file...</option>
                        {% for file in log_files %}
                        <option value="{{ file }}">{{ file }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-open" id="openBtn" disabled>
                    <i class="fas fa-folder-open me-2"></i>Open Log File
                </button>
            </form>
            {% else %}
            <div class="no-files-message">
                <i class="fas fa-folder-open mb-3" style="font-size: 2rem;"></i>
                <p>No log files found in the logs directory.</p>
                <p>Please add some .jsonl log files to the logs folder.</p>
            </div>
            {% endif %}
        </div>
    </div>

    <script>
        const logFileSelect = document.getElementById('logFile');
        const openBtn = document.getElementById('openBtn');
        const form = document.getElementById('fileSelectionForm');

        // Enable/disable open button based on selection
        logFileSelect.addEventListener('change', function() {
            openBtn.disabled = !this.value;
        });

        // Handle form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const selectedFile = logFileSelect.value;
            if (selectedFile) {
                window.location.href = `/view/${encodeURIComponent(selectedFile)}`;
            }
        });
    </script>
</body>
</html>
